spring:
  datasource:
    url: jdbc:h2:mem:ptour;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  mail:
    host:
    username:
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  cors:
    allowed-origins: http://localhost:3000
  frontend-url: http://localhost:3000
  alerts:
    error-email-to:
